<app-leftbar></app-leftbar>

<div class="container">
  <h1 class="h-center">Bot Settings</h1>

  <div class="settings">
    Mode:
    <select (change)="onChooseMode()" [(ngModel)]="currentSelected().auth">
      <option value="offline">offline</option>
      <option value="microsoft">online</option>
    </select>
    Versions:
    <select [(ngModel)]="currentSelected().version">
      @for (version of versionData(); track $index) {
        <option [value]="version">{{ version }}</option>
      }
    </select>
    Port:
    <input placeholder="Port Number" [(ngModel)]="currentSelected().port">
    Username:
    <input placeholder="Username" [(ngModel)]="currentSelected().username">
    Server:
    <input placeholder="Host" [(ngModel)]="currentSelected().host">
    <button (click)="save()">Save</button>
  </div>
</div>
