<app-topbar></app-topbar>

<div class="container">
  <h1 class="h-center">General Bot Settings</h1>
  <div class="settings">
    Mode:
    <select (change)="saveBotGeneralSettings()" [(ngModel)]="currentSelected().auth">
      <option value="offline">offline</option>
      <option value="microsoft">online</option>
    </select>
    Versions:
    <select (change)="saveBotGeneralSettings()" [(ngModel)]="currentSelected().version">
      @for (version of versionData(); track $index) {
        <option [value]="version">{{ version }}</option>
      }
    </select>
    Port:
    <input (change)="saveBotGeneralSettings()" [class.error]="currentSelected().port == 0" [(ngModel)]="currentSelected().port">
    Username:
    <input (change)="saveBotGeneralSettings()" [class.error]="currentSelected().username == ''"  [(ngModel)]="currentSelected().username">
    Server:
    <input (change)="saveBotGeneralSettings()" spellcheck="false" [class.error]="currentSelected().host == ''"[(ngModel)]="currentSelected().host">
  </div>

  <h1 class="h-center">Bot Action Settings</h1>

    Start Fishing On Start
    <input style="float: right" type="checkbox">

  </div>
  -->
</div>
