<app-leftbar></app-leftbar>
<app-chat-log></app-chat-log>

<div  class="container">
  @if (started()) {
    <button class="start-btn" (click)="onStart()">Stop</button>
  }@else {
    <button class="start-btn" (click)="onStart()">Start</button>
  }
</div>
<div class="action-menu">
  <button (click)="onStartFishing()">
  @if (isFishing()) {
    Stop Fishing
  } @else {
    Start Fishing
  }
  </button>
  <button (click)="onFollowPlayer()">
  @if (isFollowingPlayer()) {
    Stop Following Player
  } @else {
    Start Following Player
  }
  </button>
  <button (click)="onFindWater()">
  @if(isLookingForWater()) {
    Stop Looking For Water
  } @else {
    Start Looking For Water
  }
  </button>
</div>
