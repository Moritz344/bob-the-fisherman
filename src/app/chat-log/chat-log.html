<div #container class="container">
  <div class="toolbar">
    <input placeholder="Search..." [(ngModel)]="searchValue" (keyup)="onSearchLogs()">
    <button title="Clear logs" (click)="clear()"><img src="clear.svg"></button>
    <button title="Scroll to the Bottom" (click)="scrollToBottom()"><img src="bottom.svg"></button>
  </div>
  <div #messages  class="message-container">
    @for (msg of data(); track $index) {
      <div class="msg">
        <span animate.enter="chat-enter-animation" style="color: var(--text-muted);width: 100%">  {{ msg.timestamp }} </span>
        <span style="margin-left: 5px" #msg animate.enter="chat-enter-animation"
          [class.mark]="this.searchValue() && msg.msg.includes(this.searchValue())"
          [class.warn]="msg.level == 'warn'"
          [class.error]="msg.level== 'error'">
          {{msg.msg}}
        </span>
      </div>
    }
  </div>
  @if (foundCommands().length > 0) {
    <div class="autocomplete-container">
      <div class="autocomplete-items">
        @for (cmd of foundCommands();track $index) {
            <button (click)="onPasteCommand(cmd.name)" >
              <span style="font-size: 25px;margin-bottom: 0px">{{ cmd.name }} </span>
              <p style="color: var(--text-muted);margin-top: 0px">{{ cmd.desc }}</p>
            </button>
        }
      </div>
    </div>
  }
  <input 
  placeholder="Type !help to see available commands"
  [disabled]="!started()"
  #inputBox
  class="input-box"
  [(ngModel)]="commandInput"
  (keyup)="onFindCommand()"
  spellcheck="false"
  (keydown.code.enter)="onCommand()">
</div>
