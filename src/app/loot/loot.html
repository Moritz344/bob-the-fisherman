<app-leftbar></app-leftbar>
<div class="container">
  <table>
     <tr>
      <span class="table-header">Item</span>
      @for (item of items(); track $index) {
            <td> {{ item.name }} </td>
      }
     </tr>
    <tr>
      <span class="table-header">Count</span>
      @for (item of items();track $index) {
        <td>{{ item.count }}</td>
      }
    </tr>
  </table>
</div>
